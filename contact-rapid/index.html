    <style>
        :root {
            --contact-bg: #15191f;
            --contact-card: rgba(255, 255, 255, 0.94);
            --contact-ink: #161b22;
            --contact-muted: #5b6472;
            --contact-orange: #f45f16;
            --contact-line: rgba(22, 27, 34, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Montserrat', Arial, sans-serif;
            color: var(--contact-ink);
            background:
                linear-gradient(180deg, rgba(12, 14, 17, 0.64), rgba(12, 14, 17, 0.78)),
                url('/images/tigla-metalica-modulara.jpg') center / cover no-repeat,
                var(--contact-bg);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at 50% 0%, rgba(244, 95, 22, 0.22), transparent 34%);
        }

        .contact-rapid {
            position: relative;
            display: grid;
            min-height: 100vh;
            min-height: 100svh;
            place-items: center;
            padding: 28px 18px;
        }

        .contact-rapid__card {
            width: min(100%, 460px);
            padding: 30px 24px 24px;
            border: 1px solid rgba(255, 255, 255, 0.52);
            border-radius: 8px;
            background: var(--contact-card);
            box-shadow: 0 22px 54px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(12px);
        }

        .contact-rapid__logo {
            width: 150px;
            height: auto;
            display: block;
            margin: 0 auto 22px;
        }

        .contact-rapid__eyebrow {
            margin: 0 0 10px;
            color: var(--contact-orange);
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-align: center;
            text-transform: uppercase;
        }

        .contact-rapid__title {
            margin: 0;
            font-size: clamp(1.65rem, 6vw, 2.25rem);
            line-height: 1.08;
            text-align: center;
        }

        .contact-rapid__text {
            margin: 14px auto 24px;
            max-width: 34ch;
            color: var(--contact-muted);
            font-size: 0.98rem;
            line-height: 1.6;
            text-align: center;
        }

        .contact-rapid__buttons {
            display: grid;
            gap: 12px;
        }

        .contact-rapid__button {
            display: grid;
            grid-template-columns: 44px 1fr auto;
            align-items: center;
            min-height: 64px;
            padding: 10px 16px 10px 10px;
            border: 1px solid var(--contact-line);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 800;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .contact-rapid__button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
            filter: brightness(1.04);
        }

        .contact-rapid__button-icon {
            display: grid;
            width: 44px;
            height: 44px;
            place-items: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            font-size: 1.35rem;
        }

        .contact-rapid__button-arrow {
            font-size: 0.95rem;
            opacity: 0.86;
        }

        .contact-rapid__button--telegram {
            background: #2aabee;
        }

        .contact-rapid__button--viber {
            background: #7360f2;
        }

        .contact-rapid__button--whatsapp {
            background: #20ba5a;
        }

        .contact-rapid__phone {
            margin: 20px 0 0;
            color: var(--contact-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            text-align: center;
        }

        .contact-rapid__phone a {
            color: var(--contact-ink);
            font-weight: 800;
            text-decoration: none;
        }

        @media (max-width: 420px) {
            .contact-rapid {
                padding: 18px 14px;
            }

            .contact-rapid__card {
                padding: 26px 18px 20px;
            }

            .contact-rapid__button {
                grid-template-columns: 42px 1fr auto;
                min-height: 60px;
                padding-right: 12px;
            }

            .contact-rapid__button-icon {
                width: 42px;
                height: 42px;
            }
        }
    </style>

    <main class="contact-rapid" aria-labelledby="contactRapidTitle">
        <section class="contact-rapid__card">
            <img class="contact-rapid__logo" src="/images/logo-light.png" alt="MoldAcoperis">
            <p class="contact-rapid__eyebrow">Contact rapid</p>
            <h1 class="contact-rapid__title" id="contactRapidTitle">Scrie-ne direct</h1>
            <p class="contact-rapid__text">Alege aplicația preferată și discută cu echipa MoldAcoperis despre acoperișul tău.</p>

            <div class="contact-rapid__buttons" aria-label="Canale de contact MoldAcoperis">
                <a class="contact-rapid__button contact-rapid__button--telegram js-contact-rapid-link" href="tg://resolve?phone=37379360360" data-fallback-href="https://t.me/+37379360360">
                    <span class="contact-rapid__button-icon"><i class="fab fa-telegram-plane" aria-hidden="true"></i></span>
                    <span>Telegram</span>
                    <i class="fas fa-arrow-right contact-rapid__button-arrow" aria-hidden="true"></i>
                </a>
                <a class="contact-rapid__button contact-rapid__button--viber js-contact-rapid-link" href="viber://chat?number=%2B37379360360">
                    <span class="contact-rapid__button-icon"><i class="fab fa-viber" aria-hidden="true"></i></span>
                    <span>Viber</span>
                    <i class="fas fa-arrow-right contact-rapid__button-arrow" aria-hidden="true"></i>
                </a>
                <a class="contact-rapid__button contact-rapid__button--whatsapp" href="https://wa.me/37379360360" target="_blank" rel="noopener">
                    <span class="contact-rapid__button-icon"><i class="fab fa-whatsapp" aria-hidden="true"></i></span>
                    <span>WhatsApp</span>
                    <i class="fas fa-arrow-right contact-rapid__button-arrow" aria-hidden="true"></i>
                </a>
            </div>

            <p class="contact-rapid__phone">Sau sună direct: <a href="tel:+37379360360">+373 79 360 360</a></p>
        </section>
    </main>

    <script>
        document.querySelectorAll('.js-contact-rapid-link[data-fallback-href]').forEach(function (link) {
            link.addEventListener('click', function () {
                var fallbackHref = link.getAttribute('data-fallback-href');
                window.setTimeout(function () {
                    if (document.visibilityState === 'visible' && fallbackHref) {
                        window.location.href = fallbackHref;
                    }
                }, 900);
            });
        });
    </script>
